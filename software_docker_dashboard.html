<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>vCPE 本机管理面板（Docker）</title>
<style>
:root{--bg:#f0f2f5;--card:#fff;--line:#e8e8e8;--txt:#1f1f1f;--muted:#8c8c8c;--blue:#1890ff;--blueWeak:#e6f7ff;--ok:#52c41a;--warn:#faad14;--err:#ff4d4f;--off:#8c8c8c;--radius:4px;--shadow:0 1px 2px rgba(0,0,0,.03)}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif}
button,input,select,textarea{font:13px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
button,input,select,textarea{border:1px solid #d9d9d9;border-radius:4px;padding:7px 11px;background:#fff;color:#1f1f1f;transition:all .18s cubic-bezier(.2,.8,.2,1)}
input:focus,select:focus,textarea:focus{outline:none;border-color:#40a9ff;box-shadow:0 0 0 2px rgba(24,144,255,.18)}
button{cursor:pointer;min-height:34px}
button:hover{border-color:#40a9ff;color:#1890ff}
button:disabled{cursor:not-allowed;color:#bfbfbf;background:#fafafa;border-color:#e5e5e5}
#setSave{background:var(--blue);border-color:var(--blue);color:#fff}
#setSave:hover{background:#40a9ff;border-color:#40a9ff;color:#fff}
#topRestart{border-color:#ffccc7;background:#fff2f0;color:#cf1322}
#topRestart:hover{border-color:#ff7875;color:#cf1322}
.hidden{display:none!important}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(1200px 500px at 20% -10%,#263b63 0%,#151b2a 44%,#0f1320 100%);position:relative;overflow:hidden}
.login-page:before,.login-page:after{content:"";position:absolute;border-radius:50%;filter:blur(0);opacity:.35;pointer-events:none}
.login-page:before{width:420px;height:420px;left:-140px;top:-120px;background:radial-gradient(circle,#2d64d8 0%,rgba(45,100,216,0) 70%)}
.login-page:after{width:380px;height:380px;right:-120px;bottom:-110px;background:radial-gradient(circle,#00b96b 0%,rgba(0,185,107,0) 70%)}
.login-card{position:relative;z-index:1;width:min(380px,100%);background:rgba(20,27,41,.92);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:24px 28px 24px;box-shadow:0 10px 32px rgba(0,0,0,.32)}
.login-brand{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:18px}
.login-logo{display:block;width:auto;height:56px;max-width:132px}
.login-title{margin:0;text-align:center;font-size:21px;line-height:30px;color:#fff;font-weight:600;letter-spacing:.2px}
.login-form{display:flex;flex-direction:column;gap:16px}
.login-form .f{margin:0}
.login-form label{display:block;font-size:12px;line-height:20px;color:rgba(255,255,255,.7);margin-bottom:6px}
.login-form input{width:100%;height:40px;padding:0 12px;border:1px solid rgba(255,255,255,.2);border-radius:6px;background:rgba(9,15,27,.68);color:#fff}
.login-form input::placeholder{color:rgba(255,255,255,.38)}
.login-form input:focus{border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,.24)}
.login-row{display:flex;justify-content:flex-start;align-items:center;min-height:20px}
.login-form label.login-check{display:inline-flex;align-items:center;gap:8px;margin:0;color:rgba(255,255,255,.78);font-size:12px;line-height:20px;cursor:pointer;user-select:none}
.login-form .login-check input[type="checkbox"]{position:absolute;opacity:0;pointer-events:none;width:0;height:0;margin:0}
.login-form .login-check .ck{position:relative;display:inline-block;width:16px;height:16px;flex:0 0 16px;border:1px solid rgba(255,255,255,.34);border-radius:2px;background:rgba(4,18,42,.65);transition:all .2s}
.login-form .login-check:hover .ck{border-color:#69b1ff}
.login-form .login-check input[type="checkbox"]:checked + .ck{border-color:#1677ff;background:#1677ff}
.login-form .login-check input[type="checkbox"]:checked + .ck::after{content:"";position:absolute;left:4px;top:1px;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg)}
.login-form .login-check span{display:inline-block}
.login-submit{width:100%;height:40px;border:none;border-radius:6px;background:#1677ff;color:#fff;font-size:14px;font-weight:600}
.login-submit:hover{background:#4096ff;color:#fff}
.login-submit.is-loading{position:relative;pointer-events:none;opacity:.92}
.login-submit.is-loading:before{content:"";position:absolute;left:calc(50% - 34px);top:50%;width:12px;height:12px;margin-top:-6px;border:2px solid #fff;border-right-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
.login-err{min-height:20px;color:#ff7875;font-size:12px;line-height:20px}
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.top{position:sticky;top:0;z-index:9;display:flex;justify-content:space-between;gap:10px;align-items:center;padding:11px 16px;background:#fff;border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(0,0,0,.02)}
.top .left,.top .right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.name{font-weight:600;font-size:17px}
.meta{font-size:12px;color:var(--muted)}
.wrap{display:flex;flex:1;min-height:0;overflow:hidden}
.side{width:224px;height:100%;overflow:auto;background:#fff;border-right:1px solid var(--line);padding:12px 10px;display:flex;flex-direction:column;gap:6px;flex:0 0 auto}
.nav{border:1px solid transparent;background:transparent;text-align:left;padding:10px 12px;border-radius:4px;color:#434343;transition:all .18s cubic-bezier(.2,.8,.2,1)}
.nav:hover{background:#f5f5f5;color:#1f1f1f}
.nav.active{background:var(--blueWeak);border-color:#91d5ff;color:#0958d9;font-weight:600}
.main{flex:1;min-height:0;padding:20px;overflow:auto}
.page{display:none;flex-direction:column;gap:14px}
.page.active{display:flex}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.ttl{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
.ttl h2,.ttl h3{margin:0;font-size:16px;color:#262626}
.desc{margin:0;color:var(--muted);font-size:12px}
.grid6{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.ov-top{display:grid;grid-template-columns:minmax(0,2.3fr) minmax(320px,1fr);gap:10px;align-items:start}
.ov-top>.card{padding:12px}
.ov-metrics{padding:10px}
.ov-metrics .ttl{margin-bottom:6px}
.ov-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.ov-metrics .m{padding:7px 9px;min-width:0}
.ov-metrics .m .k{font-size:11px}
.ov-metrics .m .v{font-size:17px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ov-metrics .m .v.detail{white-space:normal;overflow:visible;text-overflow:clip;line-height:1.35}
.ov-metrics .m .v.inline-bar{font-size:12px;line-height:1.2;white-space:normal;overflow:visible;margin-top:2px}
.metric-row{display:flex;align-items:center;gap:12px;min-width:0}
.metric-row .bar{flex:1;min-width:80px;height:10px;background:#f5f5f5;border-radius:100px;overflow:hidden}
.metric-row .bar i{display:block;height:100%;width:0;background:#52c41a;border-radius:100px}
.metric-row.mem .bar i{background:#faad14}
.metric-row .val{flex-shrink:0;color:rgba(0,0,0,.65);font-weight:400;font-size:12px;white-space:nowrap}
.m{border:1px solid var(--line);background:#fff;border-radius:4px;padding:10px}
.m .k{font-size:12px;color:#8c8c8c}
.m .v{font-size:22px;font-weight:600;color:#262626}
.m .s{font-size:12px;color:#8c8c8c}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mini{border:1px solid var(--line);background:#fff;border-radius:4px;padding:10px}
.mini h4{margin:0 0 8px;font-size:13px;color:#262626}
canvas{width:100%;height:168px;display:block}
.ov-online{padding:11px 10px 15px}
.ov-online .ttl{margin-bottom:6px}
.ov-online canvas{height:56px}
.online-wrap{position:relative}
.online-tip{position:absolute;display:none;pointer-events:none;z-index:3;background:#fff;border:1px solid #e8e8e8;border-radius:4px;padding:8px 10px;min-width:160px;box-shadow:0 6px 16px rgba(0,0,0,.12)}
.online-tip.show{display:block}
.online-tip .t1{font-size:12px;color:#8c8c8c;margin-bottom:4px}
.online-tip .t2{display:flex;align-items:center;gap:6px;color:#262626}
.online-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.row.end{justify-content:flex-end}
.row .grow{flex:1}
.table{width:100%;border-collapse:collapse;table-layout:fixed}
.table th,.table td{border-bottom:1px solid #f0f0f0;padding:10px 8px;vertical-align:top;word-break:break-word}
.nowrap{white-space:nowrap}
.table th{font-size:12px;color:#8c8c8c;text-align:left;white-space:nowrap;background:#fafafa}
.table th.sort{cursor:pointer;padding-right:8px}
.table th.sort:after{content:"↕";display:inline-block;margin-left:6px;color:#bfbfbf;font-size:11px;line-height:1;vertical-align:middle}
.table th.sort.asc:after{content:"↑";color:var(--blue)}
.table th.sort.desc:after{content:"↓";color:var(--blue)}
.bad{display:inline-flex;align-items:center;border-radius:999px;padding:2px 10px;font-size:11px;border:1px solid transparent}
.status-online{background:#f6ffed;color:#389e0d;border-color:#b7eb8f}
.status-offline{background:#fafafa;color:#8c8c8c;border-color:#d9d9d9}
.status-abnormal{background:#fff2f0;color:#cf1322;border-color:#ffccc7}
.tag{display:inline-block;border:1px solid #d9d9d9;background:#fafafa;color:#595959;border-radius:999px;padding:2px 8px;font-size:11px;margin:0 4px 4px 0}
.on{background:#f6ffed;color:#389e0d;border-color:#b7eb8f}
.off{background:#fafafa;color:#8c8c8c;border-color:#d9d9d9}
.h-ok{background:#f6ffed;color:#389e0d;border-color:#b7eb8f}
.h-warn{background:#fffbe6;color:#d48806;border-color:#ffe58f}
.h-bad{background:#fff2f0;color:#cf1322;border-color:#ffccc7}
.lvH{color:#cf1322}.lvM{color:#d48806}.lvL{color:#1890ff}
.pg{display:flex;justify-content:flex-end;gap:8px;align-items:center;color:#8c8c8c;font-size:12px;margin-top:10px}
.empty{text-align:center;color:#8c8c8c;padding:18px}
.kv{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px 14px}
.kv div{display:flex;gap:6px}
.kv b{min-width:108px;color:#8c8c8c;font-size:12px;font-weight:500}
.kv span{color:#262626;font-size:13px;word-break:break-all}
.list{margin:0;padding-left:18px}
.list li{margin:4px 0}
.block{background:#fff;border:1px solid var(--line);border-radius:4px;padding:12px}
.set{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.set .full{grid-column:1/-1}
.f{margin-bottom:8px}
.f label{display:block;font-size:12px;color:#8c8c8c;margin-bottom:4px}
.ro{background:#fafafa;color:#595959}
#p-settings .set{grid-template-columns:repeat(2,minmax(360px,1fr));gap:14px;align-items:stretch}
#p-settings .block{padding:14px;display:flex;flex-direction:column;min-height:224px}
#p-settings .block h3{margin:0 0 14px;font-size:15px;line-height:1.2;font-weight:600;color:#262626}
#p-settings .f{margin-bottom:12px}
#p-settings .f:last-child{margin-bottom:0}
#p-settings .form-row{display:grid;grid-template-columns:126px minmax(0,1fr);align-items:center;column-gap:12px}
#p-settings .form-row>label{margin:0;color:#595959;font-size:13px;line-height:20px}
#p-settings .form-row .ctl{min-width:0}
#p-settings .form-row .ctl input,#p-settings .form-row .ctl select,#p-settings .form-row .ctl textarea{width:100%}
#p-settings .form-row.textarea-row{align-items:start}
#p-settings .form-row.textarea-row>label{padding-top:7px}
#p-settings .row{gap:10px}
#p-settings #setPort{max-width:120px}
#p-settings #setRebind{align-self:flex-start}
#p-settings .sw{vertical-align:middle}
.sw{position:relative;display:inline-block;width:44px;height:24px}
.sw input{opacity:0;width:0;height:0;position:absolute}
.sl{position:absolute;inset:0;background:#bfbfbf;border-radius:24px;transition:.2s;cursor:pointer}
.sl:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.16)}
.sw input:checked+.sl{background:var(--blue)}
.sw input:checked+.sl:before{transform:translateX(20px)}
.hint{font-size:12px;color:#0958d9;background:#e6f7ff;border:1px solid #91d5ff;border-radius:999px;padding:4px 10px}
.warn{background:#fffbe6;border:1px solid #ffe58f;color:#ad6800;border-radius:4px;padding:10px}
.op{display:flex;gap:6px;flex-wrap:nowrap;align-items:center;overflow-x:auto;overflow-y:hidden;white-space:nowrap}
.op .sbtn{white-space:nowrap;flex:0 0 auto}
.sbtn{padding:3px 8px;font-size:12px;min-height:28px;border-radius:4px}
.sbtn-primary{background:#1677ff;border-color:#1677ff;color:#fff}
.sbtn-primary:hover{background:#4096ff;border-color:#4096ff;color:#fff}
.sbtn-warning{background:#faad14;border-color:#faad14;color:#fff}
.sbtn-warning:hover{background:#ffc53d;border-color:#ffc53d;color:#fff}
.sbtn-danger{background:#ff4d4f;border-color:#ff4d4f;color:#fff}
.sbtn-danger:hover{background:#ff7875;border-color:#ff7875;color:#fff}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:30;padding:24px}
.modal.show{display:flex}
.mp{--modal-width:520px;width:min(var(--modal-width),calc(100vw - 48px));max-height:80vh;background:#fff;border:1px solid #f0f0f0;border-radius:8px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 6px 16px rgba(0,0,0,.08)}
.modal[data-size="confirm"] .mp{--modal-width:416px}
.modal[data-size="standard"] .mp{--modal-width:520px}
.modal[data-size="form"] .mp{--modal-width:720px}
.modal[data-size="data"] .mp{--modal-width:1000px}
.mh{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f0f0f0;padding:16px 24px}
.mh h3{margin:0;font-size:16px;line-height:24px;font-weight:600;color:#262626}
.mh #mdX{width:32px;height:32px;min-height:32px;padding:0;border:none;border-radius:6px;background:transparent;color:#8c8c8c;font-size:18px;line-height:1}
.mh #mdX:hover{background:#f5f5f5;color:#262626}
.mb{padding:24px;overflow:auto;max-height:calc(80vh - 120px);color:#262626;font-size:14px;line-height:22px}
.mb p{margin:0 0 16px}
.mb p:last-child{margin-bottom:0}
.mb .aux{color:#8c8c8c;font-size:12px;line-height:20px}
.mb .set{display:grid;grid-template-columns:1fr;gap:16px}
.mb .set .f{margin-bottom:0}
.mb .set input,.mb .set select,.mb .set textarea{width:100%}
.mb .kv{grid-template-columns:1fr;gap:16px}
.mb > * + *{margin-top:16px}
.ma{border-top:1px solid #f0f0f0;padding:10px 16px;display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}
.ma button{height:32px;min-height:32px;padding:0 15px;font-size:14px}
.ma .btn-default{background:#fff;border-color:#d9d9d9;color:#262626}
.ma .btn-default:hover{border-color:#1677ff;color:#1677ff}
.ma .btn-primary{background:#1677ff;border-color:#1677ff;color:#fff}
.ma .btn-primary:hover{background:#4096ff;border-color:#4096ff;color:#fff}
.ma .btn-danger{background:#ff4d4f;border-color:#ff4d4f;color:#fff}
.ma .btn-danger:hover{background:#ff7875;border-color:#ff7875;color:#fff}
.ma button.is-loading{position:relative;padding-left:32px;pointer-events:none;opacity:.9}
.ma button.is-loading::before{content:"";position:absolute;left:12px;top:50%;width:12px;height:12px;margin-top:-6px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
.confirm-box{display:flex;gap:16px;align-items:flex-start}
.confirm-icon{width:22px;height:22px;flex:0 0 22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;line-height:1;border:1px solid #ffd591;background:#fff7e6;color:#d48806;margin-top:1px}
.confirm-icon.danger{border-color:#ffccc7;background:#fff2f0;color:#cf1322}
.confirm-text{color:#262626;font-size:14px;line-height:22px}
@keyframes spin{to{transform:rotate(360deg)}}
.toasts{position:fixed;right:16px;bottom:16px;display:flex;flex-direction:column;gap:8px;z-index:40}
.toast{min-width:210px;max-width:420px;background:#fff;border:1px solid var(--line);border-left:4px solid var(--ok);border-radius:4px;padding:10px 12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.toast.err{border-left-color:var(--err)}
.toast.warn{border-left-color:var(--warn)}
@media(max-width:1200px){.grid6{grid-template-columns:repeat(3,minmax(0,1fr))}.grid4{grid-template-columns:repeat(2,minmax(0,1fr))}.ov-top{grid-template-columns:1fr}.grid2,.set,.kv{grid-template-columns:1fr}}
@media(max-width:920px){.wrap{flex-direction:column}.side{width:100%;height:auto;max-height:none;border-right:none;border-bottom:1px solid var(--line);flex-direction:row;overflow:auto}.nav{white-space:nowrap}.main{padding:10px}}
@media(max-width:720px){#p-settings .form-row{grid-template-columns:1fr;row-gap:6px}#p-settings .form-row.textarea-row>label{padding-top:0}}
@media(max-width:560px){.grid6,.grid4{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="login-brand">
      <img class="login-logo" src="logo_white.png" alt="Xmit world">
      <h1 class="login-title">本机管理登录</h1>
    </div>
    <form class="login-form" id="loginForm" autocomplete="off">
      <div class="f">
        <label>账号</label>
        <input id="lgUser" placeholder="请输入账号" />
      </div>
      <div class="f">
        <label>密码</label>
        <input id="lgPass" type="password" placeholder="请输入密码" />
      </div>
      <div class="login-row">
        <label class="login-check"><input type="checkbox" id="lgRemember" checked><i class="ck"></i><span>记住登录状态</span></label>
      </div>
      <button id="lgBtn" class="login-submit" type="submit">登录</button>
      <div class="login-err" id="loginErr"></div>
    </form>
  </div>
</div>
<div class="app hidden" id="appRoot">
<header class="top">
  <div class="left">
    <span class="name" id="topName"></span>
    <span class="bad" id="topStatus"></span>
    <span class="meta">最近心跳：<span id="topHb"></span></span>
  </div>
  <div class="right">
    <button id="topRestart">重启服务</button>
    <button id="topLogout">退出登录</button>
  </div>
</header>
<div class="wrap">
<aside class="side">
  <button class="nav active" data-p="overview">概览</button>
  <button class="nav" data-p="members">成员管理</button>
  <button class="nav" data-p="logs">日志</button>
  <button class="nav" data-p="settings">设置</button>
</aside>
<main class="main">
<section class="page active" id="p-overview">
  <div class="ov-top">
    <div class="card ov-metrics">
      <div class="ttl"><h2>概览</h2></div>
      <div class="ov-grid">
        <div class="m"><div class="k">当前网络模式</div><div class="v" id="mMode"></div></div>
        <div class="m"><div class="k">当前延迟/丢包</div><div class="v" id="mQ"></div></div>
        <div class="m"><div class="k">CPU 资源</div><div class="v detail" id="mCpu"></div></div>
        <div class="m"><div class="k">内存资源</div><div class="v detail" id="mMem"></div></div>
      </div>
    </div>
    <div class="card mini ov-online">
      <div class="ttl"><h2>近 24 小时在线情况</h2></div>
      <div class="online-wrap">
        <canvas id="cOnline"></canvas>
        <div class="online-tip" id="onlineTip"></div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="ttl"><h3>组网信息</h3></div>
    <div class="kv" id="connInfo"></div>
  </div>
</section>
<section class="page" id="p-members">
  <div class="card">
    <div class="ttl"><h2>成员管理</h2></div>
    <p class="desc">参与软件组网的 App 用户信息。</p>
    <div class="row" style="margin:8px 0">
      <input id="mbSearch" placeholder="搜索账户/姓名" />
